name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Pull latest changes
      run: |
        cd ~/github/shared-tails-server
        git pull origin main
    
    - name: Install dependencies with pnpm
      run: |
        cd ~/github/shared-tails-server
        pnpm install
    
    - name: Show deployment info
      run: |
        echo "✅ Deploy completed at $(date)"
        echo "📍 Repository: ~/github/shared-tails-server"
        cd ~/github/shared-tails-server
        echo "📂 Latest commit:"
        git log -1 --oneline
        echo "📦 Package manager: pnpm"
        pnpm --version
